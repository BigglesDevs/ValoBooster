<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Tracker — ValoBooster</title>
  <link rel="icon" href="/favicon.png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d14;
      --surface: #15151f;
      --card:    #1c1c28;
      --border:  #2a2a3a;
      --red:     #ff4655;
      --text:    #e2e2e2;
      --muted:   #777;
      --green:   #2ecc71;
      --yellow:  #f1c40f;
      --blue:    #3498db;
      --orange:  #e67e22;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .logo {
      margin-bottom: 2.5rem;
      text-align: center;
    }
    .logo a {
      text-decoration: none;
      color: var(--text);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .logo a span { color: var(--red); }
    .logo p { font-size: .8rem; color: var(--muted); margin-top: .3rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card-head {
      padding: 1.4rem 1.6rem;
      border-bottom: 1px solid var(--border);
    }
    .card-head h1 { font-size: 1.1rem; font-weight: 700; }
    .card-head p  { font-size: .82rem; color: var(--muted); margin-top: .3rem; }

    .card-body { padding: 1.6rem; }

    /* Search form */
    #searchForm { display: flex; gap: .6rem; }
    #orderIdInput {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .7rem 1rem;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      font-family: monospace;
      letter-spacing: .03em;
      transition: border-color .2s;
    }
    #orderIdInput:focus { border-color: var(--red); }
    #searchBtn {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .7rem 1.2rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .2s;
    }
    #searchBtn:hover { opacity: .85; }
    #searchBtn:disabled { opacity: .5; cursor: not-allowed; }

    .err-msg {
      color: #e74c3c;
      font-size: .82rem;
      margin-top: .7rem;
      text-align: center;
    }

    /* Order detail */
    #orderDetail { display: none; }

    .status-banner {
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .status-icon { font-size: 2rem; line-height: 1; }
    .status-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; opacity: .8; }
    .status-title { font-size: 1.1rem; font-weight: 700; margin-top: .1rem; }
    .status-sub   { font-size: .82rem; opacity: .75; margin-top: .25rem; line-height: 1.4; }

    .status-pending  { background: #f1c40f15; border: 1px solid #f1c40f33; color: var(--yellow); }
    .status-accepted { background: #3498db15; border: 1px solid #3498db33; color: var(--blue); }
    .status-completed{ background: #2ecc7115; border: 1px solid #2ecc7133; color: var(--green); }
    .status-declined { background: #e74c3c15; border: 1px solid #e74c3c33; color: #e74c3c; }
    .status-expired  { background: #e67e2215; border: 1px solid #e67e2233; color: var(--orange); }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: .7rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .88rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--muted); }
    .detail-value { font-weight: 600; text-align: right; max-width: 60%; }

    .order-id-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .8rem 1rem;
      margin-top: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
    }
    .order-id-box .oid-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .order-id-box .oid-val   { font-family: monospace; font-size: .82rem; color: var(--text); word-break: break-all; }
    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: .3rem .6rem;
      font-size: .75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      flex-shrink: 0;
    }
    .copy-btn:hover { border-color: var(--red); color: var(--red); }

    .back-link {
      display: block;
      margin-top: 1.4rem;
      text-align: center;
      font-size: .82rem;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
    }
    .back-link:hover { color: var(--text); }

    footer {
      margin-top: 3rem;
      font-size: .75rem;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--red); text-decoration: none; }
  </style>
</head>
<body>

  <div class="logo">
    <a href="/"><span>Valo</span>Booster</a>
    <p>Order Tracker</p>
  </div>

  <div class="card">
    <div class="card-head">
      <h1>Track Your Order</h1>
      <p>Enter your order ID to check the current status of your boost.</p>
    </div>
    <div class="card-body">

      <!-- Search -->
      <div id="searchSection">
        <form id="searchForm">
          <input id="orderIdInput" type="text" placeholder="Paste your order ID here…" autocomplete="off" spellcheck="false"/>
          <button id="searchBtn" type="submit">Track</button>
        </form>
        <div id="errMsg" class="err-msg"></div>
      </div>

      <!-- Order detail -->
      <div id="orderDetail">
        <div id="statusBanner" class="status-banner">
          <div class="status-icon" id="statusIcon"></div>
          <div>
            <div class="status-label" id="statusLabel"></div>
            <div class="status-title" id="statusTitle"></div>
            <div class="status-sub"   id="statusSub"></div>
          </div>
        </div>

        <div id="detailRows"></div>

        <div class="order-id-box">
          <div>
            <div class="oid-label">Order ID</div>
            <div class="oid-val" id="oidDisplay"></div>
          </div>
          <button class="copy-btn" id="copyBtn">Copy</button>
        </div>

        <button class="back-link" id="backBtn">← Look up a different order</button>
      </div>

    </div>
  </div>

  <footer>
    <p>ValoBooster &bull; <a href="/">Back to site</a></p>
  </footer>

  <script>
    const STATUS_CONFIG = {
      pending:   { icon: '⏳', cls: 'status-pending',   label: 'Pending',   title: 'Waiting for a booster',          sub: 'Your payment is reserved but not charged yet. A booster will accept your order shortly.' },
      accepted:  { icon: '✅', cls: 'status-accepted',  label: 'Accepted',  title: 'A booster is on your order!',     sub: 'Your card has been charged. Your boost will start at the scheduled time.' },
      completed: { icon: '🏆', cls: 'status-completed', label: 'Completed', title: 'Your boost is complete!',         sub: 'Your order has been finished. Enjoy your new rank!' },
      declined:  { icon: '❌', cls: 'status-declined',  label: 'Declined',  title: 'No booster was available',        sub: 'Your order was declined. Your card was not charged — the hold has been fully released.' },
      expired:   { icon: '⌛', cls: 'status-expired',   label: 'Expired',   title: 'Order expired',                   sub: 'No booster accepted within 24 hours. Your card was not charged.' },
    };

    function fmt(cents) {
      return '£' + (cents / 100).toFixed(2);
    }

    function fmtDate(unix) {
      if (!unix) return null;
      return new Date(unix * 1000).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
    }

    function showOrder(order) {
      const cfg = STATUS_CONFIG[order.status] || STATUS_CONFIG.pending;

      const banner = document.getElementById('statusBanner');
      banner.className = 'status-banner ' + cfg.cls;
      document.getElementById('statusIcon').textContent  = cfg.icon;
      document.getElementById('statusLabel').textContent = cfg.label;
      document.getElementById('statusTitle').textContent = cfg.title;
      document.getElementById('statusSub').textContent   = cfg.sub;

      const rows = [];
      rows.push(['Service',    order.service || '—']);
      rows.push(['Amount',     fmt(order.amount_cents || 0)]);
      if (order.options) rows.push(['Options', order.options]);
      if (order.addons)  rows.push(['Add-ons', order.addons]);
      const start = fmtDate(order.scheduled_start);
      if (start) rows.push(['Scheduled', start]);
      const end = fmtDate(order.scheduled_end);
      if (end)   rows.push(['Est. finish', end]);
      rows.push(['Ordered', fmtDate(order.created_at) || '—']);

      document.getElementById('detailRows').innerHTML = rows.map(([label, val]) => `
        <div class="detail-row">
          <span class="detail-label">${label}</span>
          <span class="detail-value">${val}</span>
        </div>
      `).join('');

      document.getElementById('oidDisplay').textContent = order.id;

      document.getElementById('searchSection').style.display = 'none';
      document.getElementById('orderDetail').style.display   = '';
    }

    async function lookup(id) {
      const btn    = document.getElementById('searchBtn');
      const errMsg = document.getElementById('errMsg');
      errMsg.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Looking up…';

      try {
        const res = await fetch('/api/portal/' + encodeURIComponent(id.trim()));
        if (res.status === 404) {
          errMsg.textContent = 'Order not found. Please check your order ID and try again.';
          return;
        }
        if (!res.ok) {
          errMsg.textContent = 'Something went wrong. Please try again.';
          return;
        }
        const order = await res.json();
        showOrder(order);
      } catch (e) {
        errMsg.textContent = 'Could not connect. Please try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Track';
      }
    }

    document.getElementById('searchForm').addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('orderIdInput').value.trim();
      if (!id) { document.getElementById('errMsg').textContent = 'Please enter your order ID.'; return; }
      lookup(id);
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      document.getElementById('orderDetail').style.display   = 'none';
      document.getElementById('searchSection').style.display = '';
      document.getElementById('orderIdInput').value = '';
      document.getElementById('errMsg').textContent = '';
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const oid = document.getElementById('oidDisplay').textContent;
      navigator.clipboard.writeText(oid).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    });

    // Auto-load from URL param
    const params = new URLSearchParams(location.search);
    const autoId = params.get('order');
    if (autoId) {
      document.getElementById('orderIdInput').value = autoId;
      lookup(autoId);
    }
  </script>
</body>
</html>
