<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup — ValoBooster Admin</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Valo<span>Booster</span></h1>
        <p>Create your owner account</p>
      </div>
      <form id="setupForm">
        <div class="field">
          <label>Display Name</label>
          <input type="text" id="display_name" placeholder="Owner" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@email.com" required />
        </div>
        <div class="field">
          <label>Password <span style="color:var(--muted);font-size:.75rem">(min 8 characters)</span></label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirm" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
        <p class="error-msg" id="err"></p>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
