<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — ValoBooster Admin</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>Valo<span>Booster</span></h2>
      <p id="roleLabel">Loading…</p>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-view="orders">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>Orders</span>
      </button>
      <button class="nav-item" data-view="calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span>Calendar</span>
      </button>
      <button class="nav-item admin-only hidden" data-view="boosters">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Boosters</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <strong id="userName">—</strong>
        <span id="userEmail">—</span>
      </div>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" style="width:100%">Sign Out</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Orders view -->
    <div class="view active" id="view-orders">
      <div class="page-header">
        <h1>Orders</h1>
        <p>Manage and accept incoming boost orders</p>
      </div>
      <div class="stats" id="statsRow"></div>
      <div class="table-wrap">
        <div class="table-header">
          <h2>All Orders</h2>
          <div class="filter-row">
            <select id="statusFilter">
              <option value="">All statuses</option>
              <option value="pending">Pending</option>
              <option value="accepted">Accepted</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th>Service</th>
                <th>Customer</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Booster</th>
                <th>Scheduled</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Calendar view -->
    <div class="view" id="view-calendar">
      <div class="page-header">
        <h1>Calendar</h1>
        <p>Scheduled boosts across all boosters</p>
      </div>
      <div class="cal-nav">
        <button class="btn btn-ghost btn-sm" id="calPrev">&#8249;</button>
        <h2 id="calTitle"></h2>
        <button class="btn btn-ghost btn-sm" id="calNext">&#8250;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Boosters view (admin only) -->
    <div class="view admin-only hidden" id="view-boosters">
      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">
        <div>
          <h1>Boosters</h1>
          <p>Add and manage booster accounts</p>
        </div>
        <button class="btn btn-primary btn-sm" id="addBoosterBtn">+ Add Booster</button>
      </div>
      <div class="boosters-grid" id="boostersGrid"></div>
    </div>

  </main>
</div>

<!-- Chat modal -->
<div class="modal-overlay hidden" id="chatModal">
  <div class="modal" style="max-width:540px;display:flex;flex-direction:column;max-height:90vh">
    <div class="modal-head">
      <h3 id="chatModalTitle">Chat</h3>
      <button class="modal-close" id="chatClose">&times;</button>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Type a message…" />
      <button class="btn btn-primary btn-sm" id="chatSend">Send</button>
    </div>
  </div>
</div>

<!-- Schedule modal -->
<div class="modal-overlay hidden" id="scheduleModal">
  <div class="modal">
    <div class="modal-head">
      <h3>Schedule Boost</h3>
      <button class="modal-close" id="scheduleClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Start Date &amp; Time</label>
        <input type="datetime-local" id="schedStart" />
      </div>
      <div class="field">
        <label>End Date &amp; Time</label>
        <input type="datetime-local" id="schedEnd" />
      </div>
      <div class="field">
        <label>Notes</label>
        <input type="text" id="schedNotes" placeholder="Any notes for this order…" />
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="scheduleCancel">Cancel</button>
      <button class="btn btn-primary" id="scheduleSave">Save</button>
    </div>
  </div>
</div>

<!-- Add booster modal -->
<div class="modal-overlay hidden" id="boosterModal">
  <div class="modal">
    <div class="modal-head">
      <h3>Add Booster</h3>
      <button class="modal-close" id="boosterClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Display Name</label>
        <input type="text" id="bName" placeholder="Booster name" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="bEmail" placeholder="booster@email.com" />
      </div>
      <div class="field">
        <label>Temporary Password</label>
        <input type="text" id="bPassword" placeholder="They will be asked to change this" />
      </div>
      <div class="field">
        <label>Role</label>
        <select id="bRole">
          <option value="booster">Booster</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <p class="error-msg" id="boosterErr"></p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="boosterCancel">Cancel</button>
      <button class="btn btn-primary" id="boosterSave">Add Booster</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
