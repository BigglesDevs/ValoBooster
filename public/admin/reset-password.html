<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password — ValoBooster Admin</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Valo<span>Booster</span></h1>
        <p>Set your new password</p>
      </div>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.2rem;text-align:center">
        Your account was created with a temporary password. Please set a new one before continuing.
      </p>
      <form id="resetForm">
        <div class="field">
          <label>New Password <span style="color:var(--muted);font-size:.75rem">(min 8 characters)</span></label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirm" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary">Set Password</button>
        <p class="error-msg" id="err"></p>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
