<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ValoBooster Admin</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Valo<span>Booster</span></h1>
        <p>Staff Portal</p>
      </div>
      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@email.com" required autocomplete="email" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
        <p class="error-msg" id="err"></p>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
